<!-- final-key.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Key - Moon Light Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f1a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .glass-card { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.14); border-radius: 1.5rem; padding: 2rem; max-width: 620px; width: 94%; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .key-display { background: rgba(0,0,0,0.6); border: 1px dashed rgba(100,100,255,0.4); border-radius: 1rem; padding: 1.15rem 1.2rem; font-family: 'JetBrains Mono', monospace; font-size: 1.55rem; word-break: break-all; text-align: center; }
        .btn { transition: all 0.25s ease; }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .toast { position: fixed; top: 1rem; right: 1rem; background: rgba(18,24,45,0.92); backdrop-filter: blur(5px); border: 1px solid rgba(102,126,234,0.3); border-radius: 0.75rem; padding: 0.9rem 1rem; display: flex; align-items: center; gap: 0.65rem; min-width: 300px; transform: translateX(120%); opacity: 0; transition: all 0.35s ease; z-index: 9999; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-success { color: #7ee787; border-color: #7ee787; }
        .toast-error { color: #f97316; border-color: #f97316; }
    </style>
</head>
<body>
    <div class="glass-card text-center">
        <h1 class="text-4xl font-extrabold gradient-text mb-6">Key Của Bạn</h1>
        <div id="final-key-display" class="text-3xl font-mono bg-black/60 p-6 rounded-xl mb-8 break-all"></div>
        <button id="copy-key" class="px-10 py-5 rounded-full bg-green-600 hover:bg-green-700 text-white font-bold text-xl transition-all">
            Copy Key
        </button>
    </div>

    <script>
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type} show`;
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3800);
        }

        async function loadKey() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (token) {
                try {
                    const res = await fetch(`/.netlify/functions/validate-key?token=${encodeURIComponent(token)}`);
                    if (!res.ok) {
                        // Try fallback localStorage if server token validation thảm bại
                        throw new Error('validate-failed');
                    }

                    const data = await res.json();
                    if (!data.valid) throw new Error(data.message || 'Token không hợp lệ');

                    const key = data.key || 'moonlight-error';
                    document.getElementById('final-key-display').innerText = key;
                    document.getElementById('copy-key').onclick = () => {
                        navigator.clipboard.writeText(key).then(() => showToast('Đã sao chép key!'), () => showToast('Copy thất bại', 'error'));
                    };

                    return;
                } catch (error) {
                    console.warn('validate token via server failed, checking local fallback', error);
                    const localKey = localStorage.getItem(`fallback_key_${token}`);
                    if (localKey) {
                        localStorage.removeItem(`fallback_key_${token}`);
                        document.getElementById('final-key-display').innerText = localKey;
                        document.getElementById('copy-key').onclick = () => {
                            navigator.clipboard.writeText(localKey).then(() => showToast('Đã sao chép key!'), () => showToast('Copy thất bại', 'error'));
                        };
                        return;
                    }

                    document.getElementById('final-key-display').innerText = 'Token không hợp lệ hoặc đã dùng!';
                    document.getElementById('copy-key').classList.add('hidden');
                    return;
                }
            }

            document.getElementById('final-key-display').innerText = 'Link không hợp lệ: thiếu token.';
            document.getElementById('copy-key').classList.add('hidden');
        }

        loadKey();
    </script>
</body>
</html>
