<!-- final-key.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Key - Moon Light Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f1a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .glass-card { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.14); border-radius: 1.5rem; padding: 2rem; max-width: 620px; width: 94%; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .key-display { background: rgba(0,0,0,0.6); border: 1px dashed rgba(100,100,255,0.4); border-radius: 1rem; padding: 1.15rem 1.2rem; font-family: 'JetBrains Mono', monospace; font-size: 1.55rem; word-break: break-all; text-align: center; }
        .btn { transition: all 0.25s ease; }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .toast { position: fixed; top: 1rem; right: 1rem; background: rgba(18,24,45,0.92); backdrop-filter: blur(5px); border: 1px solid rgba(102,126,234,0.3); border-radius: 0.75rem; padding: 0.9rem 1rem; display: flex; align-items: center; gap: 0.65rem; min-width: 300px; transform: translateX(120%); opacity: 0; transition: all 0.35s ease; z-index: 9999; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-success { color: #7ee787; border-color: #7ee787; }
        .toast-error { color: #f97316; border-color: #f97316; }
        .loader { width: 24px; height: 24px; border: 3px solid rgba(102,126,234,0.3); border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.5); } }
    </style>
</head>
<body>
    <!-- Stars Background -->
    <div class="stars" id="stars"></div>
    
    <div class="glass-card text-center">
        <h1 class="text-4xl font-extrabold gradient-text mb-6">🔑 Key của Bạn</h1>
        
        <div id="loading" class="mb-6">
            <div class="loader mx-auto mb-3"></div>
            <p class="text-gray-300">Đang xác minh key...</p>
        </div>
        
        <div id="success" class="hidden">
            <div class="bg-green-500/10 border border-green-500/30 rounded-lg p-4 mb-6">
                <p class="text-green-300 text-sm font-semibold flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    Key verified thành công!
                </p>
            </div>
            
            <div id="final-key-display" class="key-display text-3xl font-mono bg-black/60 p-6 rounded-xl mb-6 break-all"></div>
            
            <div id="countdown" class="text-lg text-gray-300 mb-6">
                Thời gian có hiệu lực: <span id="time-left" class="text-green-400 font-bold">24:00:00</span>
            </div>
            
            <div class="flex gap-3 flex-col sm:flex-row">
                <button id="copy-key" class="flex-1 px-10 py-4 rounded-full bg-green-600 hover:bg-green-700 text-white font-bold text-lg transition-all transform hover:scale-105 flex items-center justify-center gap-2">
                    <i data-lucide="copy" class="w-5 h-5"></i>
                    Copy Key
                </button>
                <button id="open-dashboard" class="flex-1 px-10 py-4 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg transition-all transform hover:scale-105 flex items-center justify-center gap-2">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    Dashboard
                </button>
            </div>
        </div>
        
        <div id="error" class="hidden">
            <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-4 mb-6">
                <p class="text-red-300 text-sm font-semibold flex items-center justify-center gap-2">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <span id="error-msg">Lỗi xác minh key</span>
                </p>
            </div>
            
            <div id="final-key-display" class="key-display text-2xl text-red-400 bg-red-500/5 p-6 rounded-xl mb-6"></div>
            
            <a href="/getkey.html" class="inline-block px-10 py-4 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg transition-all transform hover:scale-105 flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Quay lại trang nhập
            </a>
        </div>
        
        <p class="text-xs text-gray-500 mt-8">
            ⚠️ Token này chỉ dùng được một lần. Ngoài ra, link sẽ hết hạn sau 24 giờ.
        </p>
    </div>

    <script>
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type} show`;
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3800);
        }

        function createStars() {
            const starsContainer = document.getElementById('stars');
            const count = 50; // Reduced from 100 for better performance
            
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('success').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('error-msg').innerText = message;
            document.getElementById('final-key-display').innerText = '❌ ' + message;
        }

        async function loadKey() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');

                if (!token) {
                    showError('Link không hợp lệ: thiếu token');
                    return;
                }

                // Try server validation
                try {
                    const res = await fetch(`/.netlify/functions/validate-key?token=${encodeURIComponent(token)}`);
                    
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }

                    const data = await res.json();
                    if (!data.valid) {
                        throw new Error(data.message || 'Token không hợp lệ hoặc đã hết hạn');
                    }

                    const key = data.key || 'moonlight-error';
                    setupSuccess(key);
                    return;
                } catch (serverError) {
                    console.warn('Server validation failed, trying localStorage fallback...', serverError);
                }

                // Fallback: try localStorage
                const localKey = localStorage.getItem(`fallback_key_${token}`);
                if (localKey) {
                    localStorage.removeItem(`fallback_key_${token}`);
                    setupSuccess(localKey);
                    return;
                }

                showError('Token không hợp lệ, đã dùng, hoặc hết hạn');
            } catch (error) {
                console.error('Load key error:', error);
                showError('Lỗi: ' + error.message);
            }
        }

        function setupSuccess(key) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
            document.getElementById('final-key-display').innerText = key;
            
            document.getElementById('copy-key').onclick = () => {
                navigator.clipboard.writeText(key).then(() => {
                    showToast('✓ Đã sao chép key!');
                }).catch(() => showToast('Copy thất bại', 'error'));
            };

            document.getElementById('open-dashboard').onclick = () => {
                window.open('/dashboard.html', '_blank');
            };

            // Start countdown (24h from now)
            startCountdown(Date.now() + 24 * 60 * 60 * 1000);
        }

        function startCountdown(expireTime) {
            const countdownElement = document.getElementById('time-left');
            const interval = setInterval(() => {
                const now = Date.now();
                const timeLeft = expireTime - now;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    countdownElement.innerText = '00:00:00';
                    document.getElementById('final-key-display').innerText = '⏰ Key đã hết hạn!';
                    document.getElementById('copy-key').disabled = true;
                    document.getElementById('copy-key').classList.add('disabled');
                    showToast('Key đã hết hạn', 'error');
                    return;
                }
                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
                countdownElement.innerText = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        loadKey();
    </script>
</body>
</html>
