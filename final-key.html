<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Key - Moon Light Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="moonlight.png" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f1a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 1rem; }
        .glass-card { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.14); border-radius: 1.5rem; padding: 2rem; max-width: 620px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.4); position: relative; z-index: 1; }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .key-display { background: rgba(0,0,0,0.6); border: 1px dashed rgba(100,100,255,0.4); border-radius: 1rem; padding: 1.25rem; font-family: 'Courier New', monospace; font-size: 1.5rem; word-break: break-all; text-align: center; color: #a5f3fc; letter-spacing: 0.05em; }
        .key-display.error { color: #f87171; border-color: rgba(248,113,113,0.4); }
        .toast { position: fixed; top: 1rem; right: 1rem; background: rgba(18,24,45,0.92); backdrop-filter: blur(5px); border: 1px solid rgba(102,126,234,0.3); border-radius: 0.75rem; padding: 0.9rem 1rem; display: flex; align-items: center; gap: 0.65rem; min-width: 280px; transform: translateX(120%); opacity: 0; transition: all 0.35s ease; z-index: 9999; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-success { color: #7ee787; border-color: #7ee787; }
        .toast-error { color: #f97316; border-color: #f97316; }
        .loader { width: 28px; height: 28px; border: 3px solid rgba(102,126,234,0.3); border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.5); } }
        .btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.875rem 1.5rem; border-radius: 9999px; font-weight: 700; font-size: 1rem; transition: all 0.25s; cursor: pointer; border: none; flex: 1; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-green { background: linear-gradient(to right, #22c55e, #10b981); color: white; }
        .btn-indigo { background: linear-gradient(to right, #6366f1, #4f46e5); color: white; }
        .countdown-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.75rem; padding: 0.75rem 1rem; text-align: center; }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="glass-card text-center">
        <h1 class="text-4xl font-extrabold gradient-text mb-6">🔑 Your Key</h1>

        <!-- Loading -->
        <div id="view-loading" class="mb-6">
            <div class="loader mx-auto mb-3"></div>
            <p class="text-gray-300">Verifying token...</p>
        </div>

        <!-- Success -->
        <div id="view-success" class="hidden">
            <div class="bg-green-500/10 border border-green-500/30 rounded-lg p-3 mb-5 flex items-center justify-center gap-2">
                <i data-lucide="check-circle" class="w-5 h-5 text-green-400"></i>
                <span class="text-green-300 text-sm font-semibold">Token verified successfully!</span>
            </div>

            <div id="key-display" class="key-display mb-5"></div>

            <div class="countdown-box mb-5">
                <p class="text-gray-400 text-sm mb-1">Time remaining:</p>
                <span id="time-left" class="text-green-400 font-bold text-xl font-mono">24:00:00</span>
            </div>

            <div class="flex gap-3">
                <button id="copy-key-btn" class="btn btn-green">
                    <i data-lucide="copy" class="w-5 h-5"></i>
                    Copy Key
                </button>
                <a href="/getkey.html" class="btn btn-indigo text-white no-underline">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    Home
                </a>
            </div>
        </div>

        <!-- Error -->
        <div id="view-error" class="hidden">
            <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-3 mb-5 flex items-center justify-center gap-2">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-400"></i>
                <span id="error-msg" class="text-red-300 text-sm font-semibold">Token verification error</span>
            </div>

            <div id="error-display" class="key-display error mb-5 text-base"></div>

            <a href="/getkey.html" class="btn btn-indigo text-white no-underline" style="display:inline-flex;width:auto;padding:0.75rem 2rem;">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Go back to get a new Key
            </a>
        </div>

        <p class="text-xs text-gray-600 mt-7">
            ⚠️ Token is single-use only. Key is valid for 24 hours.
        </p>
    </div>

    <script>
        lucide.createIcons();

        // ── Clean up old localStorage entries on page load ──
        (function cleanupOldKeys() {
            try {
                // 1. Clear fk_ cache if expired
                const fkExp = parseInt(localStorage.getItem('fk_exp') || '0');
                if (fkExp && Date.now() > fkExp) {
                    ['fk_token','fk_key','fk_exp','fk_logged'].forEach(k => localStorage.removeItem(k));
                }

                // 2. Clear old fallback_key_* — but only after loadKey() has finished
                // (called at end of page, not here to avoid race condition)

                // 3. Clear old lv_ session if expired
                const lvExp = parseInt(localStorage.getItem('lv_token_expire') || '0');
                if (lvExp && Date.now() > lvExp) {
                    ['lv_token','lv_token_expire','lv_verified','lv_start_time','visited_getkey'].forEach(k => localStorage.removeItem(k));
                }
            } catch(e) {}
        })();

        // Create background stars
        (function() {
            const c = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${Math.random()*3+2}s`;
                c.appendChild(s);
            }
        })();

        function showToast(message, type = 'success') {
            const t = document.createElement('div');
            t.className = `toast toast-${type} show`;
            t.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(t);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3800);
        }

        function showError(msg, detail = '') {
            document.getElementById('view-loading').classList.add('hidden');
            document.getElementById('view-success').classList.add('hidden');
            document.getElementById('view-error').classList.remove('hidden');
            document.getElementById('error-msg').textContent = msg;
            document.getElementById('error-display').textContent = detail || '❌ ' + msg;
            lucide.createIcons();
        }

        // Call Netlify function to log used key to Blobs
        async function logKeyToServer(key, expireAt) {
            try {
                await fetch('/.netlify/functions/log-key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, source: 'final-key', expireAt })
                });
            } catch(e) {
                console.warn('logKeyToServer failed (non-critical):', e);
            }
        }

        function showSuccess(key, expireAt) {
            document.getElementById('view-loading').classList.add('hidden');
            document.getElementById('view-error').classList.add('hidden');
            document.getElementById('view-success').classList.remove('hidden');
            document.getElementById('key-display').textContent = key;
            lucide.createIcons();

            // Log to server — only once, not again on reload/reopen
            if (localStorage.getItem('fk_logged') !== key) {
                logKeyToServer(key, expireAt);
                localStorage.setItem('fk_logged', key);
            }

            // Copy button
            document.getElementById('copy-key-btn').onclick = () => {
                navigator.clipboard.writeText(key)
                    .then(() => showToast('✓ Key copied!'))
                    .catch(() => showToast('Copy failed', 'error'));
            };

            // Countdown uses expireAt from server (accurate), fallback 24h
            startCountdown(expireAt || (Date.now() + 24 * 60 * 60 * 1000));
        }

        function startCountdown(expireAt) {
            const el = document.getElementById('time-left');
            function tick() {
                const left = expireAt - Date.now();
                if (left <= 0) {
                    el.textContent = '00:00:00';
                    el.classList.remove('text-green-400');
                    el.classList.add('text-red-400');
                    document.getElementById('key-display').textContent = '⏰ Key has expired!';
                    document.getElementById('key-display').classList.add('error');
                    document.getElementById('copy-key-btn').disabled = true;
                    showToast('Key expired — redirecting...', 'error');

                    // Clear localStorage cache on expiry
                    clearCache();

                    // Redirect to getkey after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/getkey.html';
                    }, 3000);
                    return;
                }
                const h = Math.floor(left / 3600000);
                const m = Math.floor((left % 3600000) / 60000);
                const s = Math.floor((left % 60000) / 1000);
                el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                // Change color when time is running low
                if (left < 3600000) { el.classList.remove('text-green-400'); el.classList.add('text-yellow-400'); }
                if (left < 600000)  { el.classList.remove('text-yellow-400'); el.classList.add('text-red-400'); }
                setTimeout(tick, 1000);
            }
            tick();
        }

        // ── Cache helpers — uses localStorage so reopening tab still shows key ──
        function saveCache(token, key, expireAt) {
            try {
                localStorage.setItem('fk_token', token);
                localStorage.setItem('fk_key', key);
                localStorage.setItem('fk_exp', expireAt.toString());
            } catch(e) {}
        }

        function loadCache(token) {
            try {
                const savedToken = localStorage.getItem('fk_token');
                const key = localStorage.getItem('fk_key');
                const exp = parseInt(localStorage.getItem('fk_exp') || '0');
                // Token must match and not be expired
                if (savedToken === token && key && Date.now() < exp) {
                    return { key, expireAt: exp };
                }
                // Expired or different token → clear
                if (savedToken === token) clearCache();
            } catch(e) {}
            return null;
        }

        function clearCache() {
            localStorage.removeItem('fk_token');
            localStorage.removeItem('fk_key');
            localStorage.removeItem('fk_exp');
            localStorage.removeItem('fk_logged');
        }

        // ── Main: retrieve key from token ──
        async function loadKey() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showError('Invalid link', '❌ Missing token in URL');
                return;
            }

            // 1. Check localStorage cache — reopening tab still shows key
            const cached = loadCache(token);
            if (cached) {
                showSuccess(cached.key, cached.expireAt);
                return;
            }

            // 2. Validate qua server
            try {
                const res = await fetch(`/.netlify/functions/validate-key?token=${encodeURIComponent(token)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (!data.valid) throw new Error(data.message || 'Token is invalid or has expired');

                const expireAt = data.expireAt || (Date.now() + 24 * 60 * 60 * 1000);
                saveCache(token, data.key, expireAt);
                showSuccess(data.key, expireAt);
                return;
            } catch (serverErr) {
                console.warn('Server validate failed, trying fallback...', serverErr);
            }

            // 3. Fallback offline
            const localKey = localStorage.getItem(`fallback_key_${token}`);
            if (localKey) {
                const expireAt = Date.now() + 24 * 60 * 60 * 1000;
                saveCache(token, localKey, expireAt);
                showSuccess(localKey, expireAt);
                return;
            }

            // 4. Complete failure
            showError('Token is invalid, already used, or expired', '❌ Please go back to the start page to get a new key.');
        }

        loadKey().finally(() => {
            // Clean up fallback_key_* after loadKey has finished processing
            try {
                const toDelete = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (k && k.startsWith('fallback_key_')) toDelete.push(k);
                }
                toDelete.forEach(k => localStorage.removeItem(k));
            } catch(e) {}
        });
    </script>
</body>
</html>
