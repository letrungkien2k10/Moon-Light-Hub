<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Key 24h - Moon Light Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f1a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 2.5rem; max-width: 600px; width: 95%; box-shadow: 0 0 40px rgba(102,126,234,0.3); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pulse-glow { animation: pulse-glow 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 20px rgba(34,197,94,0.5); } 50% { box-shadow: 0 0 40px rgba(34,197,94,0.8); } }
        .btn { transition: all 0.3s ease; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(34,197,94,0.4); }
    </style>
</head>
<body>
    <div class="glass-card text-center">
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center pulse-glow">
            <i data-lucide="key" class="w-10 h-10 text-white"></i>
        </div>

        <h1 class="text-4xl font-extrabold gradient-text mb-4">Moon Light Hub - Key 24h</h1>

        <p class="text-lg text-gray-300 mb-8">
            Chào mừng bạn đến với Moon Light Hub!<br>
            Để nhận key miễn phí, hãy hoàn thành nhiệm vụ link4sub trước.
        </p>

        <a id="start-link4sub" href="#" class="inline-block px-10 py-5 rounded-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold text-xl btn shadow-xl shadow-green-500/40">
            <i data-lucide="external-link" class="w-6 h-6 inline mr-2"></i>
            Bắt đầu nhiệm vụ Link4Sub
        </a>

        <p class="text-sm text-gray-500 mt-8">
            Sau khi hoàn thành nhiệm vụ, bạn sẽ được chuyển về bước tiếp theo.
        </p>
    </div>

    <script>
        lucide.createIcons();

        function generateRandomToken(length = 24) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let token = '';
            for (let i = 0; i < length; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return token;
        }

        document.getElementById('start-link4sub').addEventListener('click', (e) => {
            e.preventDefault();
            const token = generateRandomToken();
            localStorage.setItem('link4sub_token', token);
            const redirectUrl = `${window.location.origin}/getkey2.html?token=${encodeURIComponent(token)}`;
            const link4subUrl = `https://example.com/link4sub?redirect=${encodeURIComponent(redirectUrl)}`;
            window.location.href = link4subUrl;
        });
    </script>
</body>
</html>
