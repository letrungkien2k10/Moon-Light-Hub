<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Key 24h - Moon Light Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://publisher.linkvertise.com/cdn/linkvertise.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* giữ nguyên style cũ */
        body { font-family: 'Inter', sans-serif; background-color: #0f0f1a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 2.5rem; max-width: 600px; width: 95%; box-shadow: 0 0 40px rgba(102,126,234,0.3); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pulse-glow { animation: pulse-glow 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 20px rgba(34,197,94,0.5); } 50% { box-shadow: 0 0 40px rgba(34,197,94,0.8); } }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.5); } }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="glass-card text-center">
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center pulse-glow">
            <i data-lucide="key" class="w-10 h-10 text-white"></i>
        </div>

        <h1 class="text-4xl font-extrabold gradient-text mb-4">Moon Light Hub - Key 24h</h1>

        <p class="text-lg text-gray-300 mb-8">
            Chào mừng bạn đến với Moon Light Hub!<br>
            Để nhận key miễn phí, hãy hoàn thành nhiệm vụ Linkvertise trước.
        </p>

        <button id="start-linkvertise" class="inline-block px-10 py-5 rounded-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold text-xl transition-all">
            <i data-lucide="external-link" class="w-6 h-6 inline mr-2"></i>
            Bắt đầu nhiệm vụ Linkvertise
        </button>

        <p class="text-sm text-gray-500 mt-8">
            Sau khi hoàn thành, bạn sẽ được chuyển về bước tiếp theo tự động.
        </p>
    </div>

    <script>
        lucide.createIcons();

        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 4 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        document.getElementById('start-linkvertise').addEventListener('click', async () => {
            try {
                // Không lưu token vào localStorage nữa
                // Chỉ tạo token tạm để redirect (server sẽ xử lý)
                const redirectUrl = `${window.location.origin}/getkey2.html`;
                const lvUrl = `https://direct-link.net/4462018/EbAEdp0Kh1IM?redirect=${encodeURIComponent(redirectUrl)}`;

                if (typeof linkvertise === 'function') {
                    linkvertise(4462018, { whitelist: [], blacklist: [] });
                }

                window.location.href = lvUrl;
            } catch (err) {
                alert('Có lỗi xảy ra. Vui lòng thử lại hoặc liên hệ admin.');
                console.error(err);
            }
        });
    </script>
</body>
</html>
